[parser]
full_help = """

аргументы:
  промпт                  текст запроса (без аргумента — интерактивный режим)

параметры:
  -h, --help              показать эту справку
  -p, --provider          провайдер: openrouter, deepseek, anthropic, openai, xai, google
  -m, --model             имя модели (по умолчанию из ai.ini [models])
  -i, --instruction       системная инструкция (переопределяет ai.ini [system])
  -l, --language          язык: en, ru (переопределяет системную локаль)
  -lm, --list-models      список доступных моделей провайдера
  -lp, --list-providers   список всех провайдеров
  -v, --verbose           показывать результат команд bash в режиме агента
  -t, --telegram          запустить Telegram бота (настройки в ai.ini [telegram])
  -s, --skills            показать список скилов
  -u, --update            проверить обновления

  в чате: /<имя> [арг]        запустить скил

примеры:
  ai                          интерактивный режим
  ai "промпт"                 одиночный запрос
  ai -p openrouter -lm        список моделей провайдера
  ai -p openrouter -m gpt-5.3 "промпт"  конкретный провайдер/модель
  ai -s                       список скилов
"""

