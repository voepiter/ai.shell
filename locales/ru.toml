[parser]
full_help = """ai.shell v{version} — многомодельный AI-ассистент для терминала с bash агентом.

использование: ai [-h] [-V] [-p NAME] [-m NAME] [-i TEXT] [-l CODE] [-lm] [-lp] [-v] [prompt]

аргументы:
  prompt                  текст запроса (без аргумента — интерактивный режим)

параметры:
  -h, --help              показать эту справку и выйти
  -V, --version           показать версию и выйти
  -p, --provider NAME     провайдер: google, openai, xai, deepseek, anthropic, openrouter
  -m, --model NAME        имя модели (по умолчанию из ai.ini [models])
  -i, --instruction TEXT  системная инструкция (переопределяет ai.ini [system])
  -l, --language CODE     язык: en, ru (переопределяет системную локаль)
  -lm, --list-models      список доступных моделей провайдера и выход
  -lp, --list-providers   список всех провайдеров и выход
  -v, --verbose           показывать команды bash и вывод в режиме агента

примеры:
  ai                                    интерактивный режим
  ai "запрос"                           одиночный запрос
  ai -p openrouter --list-models        список моделей провайдера
  ai -p openrouter -m gpt-5.3 "запрос"  конкретный провайдер/модель"""

