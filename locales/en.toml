[parser]
full_help = """ai.shell v{version} — multi-model AI terminal assistant with a shell agent.

usage: ai [-h] [-V] [-p NAME] [-m NAME] [-i TEXT] [-l CODE] [-lm] [-lp] [-v] [prompt]

arguments:
  prompt                  prompt text (omit to enter chat mode)

options:
  -h, --help              show this help and exit
  -V, --version           show version and exit
  -p, --provider NAME     provider: google, openai, xai, deepseek, anthropic, openrouter
  -m, --model NAME        model name (default: from ai.ini [models])
  -i, --instruction TEXT  system instruction (overrides ai.ini [system])
  -l, --language CODE     language: en, ru (overrides system locale)
  -lm, --list-models      list available models for selected provider and exit
  -lp, --list-providers   list all supported providers and exit
  -v, --verbose           show bash commands and output in agent mode

examples:
  ai                                    interactive chat mode
  ai "prompt"                           single request
  ai -p openrouter --list-models        list models for provider
  ai -p openrouter -m gpt-5.3 "prompt"  use specific provider/model"""

